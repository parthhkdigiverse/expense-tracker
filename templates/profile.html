{% extends "base.html" %}

{% block content %}
<div class="dashboard-header">
    <h1>Edit Profile</h1>
    <a href="{{ url_for('dashboard') }}" class="btn-secondary">Back to Dashboard</a>
</div>

<div class="card" style="max-width: 600px;">
    <div class="card-header">
        <h2>Profile Details</h2>
    </div>
    <div class="card-body">
        <form action="{{ url_for('profile') }}" method="POST">
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" value="{{ profile.get('full_name', '') }}" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="website">Website</label>
                <input type="url" id="website" name="website" value="{{ profile.get('website', '') }}" placeholder="https://example.com">
            </div>
            <div class="form-group">
                <label for="avatar_url">Avatar URL</label>
                <input type="url" id="avatar_url" name="avatar_url" value="{{ profile.get('avatar_url', '') }}" placeholder="https://example.com/avatar.jpg">
            </div>
            <div style="text-align: right; margin-top: 2rem;">
                <button type="submit" class="btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
