{% extends "base.html" %}

{% block content %}
<div class="dashboard-header">
    <h1>{{ 'Edit Expense' if expense else 'Add New Expense' }}</h1>
    <a href="{{ url_for('dashboard') }}" class="btn-secondary">Back to Dashboard</a>
</div>

<div class="card" style="max-width: 600px;">
    <div class="card-header">
        <h2>{{ 'Edit Expense Details' if expense else 'New Expense Details' }}</h2>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" value="{{ expense.date if expense else today }}" required>
            </div>
            
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    <option value="" disabled {% if not expense %}selected{% endif %}>Select Category</option>
                    {% for cat in ['Food', 'Transport', 'Utilities', 'Entertainment', 'Shopping', 'Health', 'Travel', 'Education', 'Other'] %}
                        <option value="{{ cat }}" {% if expense and expense.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" id="amount" name="amount" step="0.01" value="{{ expense.amount if expense else '' }}" placeholder="0.00" required>
            </div>
            
            <div class="form-group">
                <label for="description">Description</label>
                <input type="text" id="description" name="description" value="{{ expense.description if expense else '' }}" placeholder="Dinner with friends..." required>
            </div>
            
            {% if not expense %}
            <div class="form-group checkbox-group">
                <input type="checkbox" id="is_recurring" name="is_recurring">
                <label for="is_recurring">Recurring Expense? (Monthly)</label>
            </div>
            {% endif %}
            
            <button type="submit" class="btn-primary" style="margin-top: 1.5rem;">{{ 'Update Expense' if expense else 'Add Expense' }}</button>
        </form>
    </div>
</div>

<style>
    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    .checkbox-group input {
        width: auto;
    }
</style>
{% endblock %}
