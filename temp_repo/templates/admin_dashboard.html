{% extends "base.html" %}

{% block content %}
<div class="dashboard-header">
    <h2>Admin Dashboard</h2>
    <p>Welcome, {{ username }}</p>
</div>

<h3>Registered Users</h3>
<div class="expense-list">
    {% if users %}
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr>
                <td>#{{ u[0] }}</td>
                <td><span style="font-weight: 500;">{{ u[1] }}</span></td>
                <td>
                    <a href="{{ url_for('admin_view_user', user_id=u[0]) }}" class="add-btn"
                        style="padding: 5px 12px; font-size: 0.85rem;">View Expenses</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p class="no-data">No other users registered.</p>
    {% endif %}
</div>
{% endblock %}
