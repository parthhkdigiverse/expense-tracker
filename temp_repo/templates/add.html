{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2>{% if expense %}Edit Expense{% else %}Add New Expense{% endif %}</h2>
    <form method="POST">
        <label>Date</label>
        <input type="date" name="date" value="{{ expense[1] if expense else today }}" required>

        <label>Category</label>
        <select name="category" required>
            <option value="Food" {% if expense and expense[2]=='Food' %}selected{% endif %}>Food</option>
            <option value="Transport" {% if expense and expense[2]=='Transport' %}selected{% endif %}>Transport</option>
            <option value="Shopping" {% if expense and expense[2]=='Shopping' %}selected{% endif %}>Shopping</option>
            <option value="Entertainment" {% if expense and expense[2]=='Entertainment' %}selected{% endif %}>
                Entertainment</option>
            <option value="Bills" {% if expense and expense[2]=='Bills' %}selected{% endif %}>Bills</option>
            <option value="Others" {% if expense and expense[2]=='Others' %}selected{% endif %}>Others</option>
        </select>

        <label>Amount (₹)</label>
        <input type="number" step="0.01" name="amount" value="{{ expense[3] if expense else '' }}" required>

        <label>Description</label>
        <input type="text" name="description" placeholder="e.g. Lunch with friends"
            value="{{ expense[4] if expense else '' }}" required>

        {% if not expense %}
        <div style="display: flex; align-items: center; margin-bottom: 20px;">
            <input type="checkbox" name="is_recurring" id="is_recurring"
                style="width: auto; margin-bottom: 0; margin-right: 10px;">
            <label for="is_recurring" style="margin-bottom: 0; cursor: pointer;">Repeat Monthly</label>
        </div>
        {% endif %}

        <div class="form-actions">
            <button type="submit" class="primary-btn">{% if expense %}Update{% else %}Save{% endif %} Expense</button>
            <a href="{{ url_for('dashboard') }}" class="cancel-btn">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
