{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <h2>Reset Password</h2>

    {% if step == '1' %}
    <form method="POST">
        <label>Enter your Username</label>
        <input type="text" name="username" required>
        <button type="submit" class="primary-btn">Next</button>
    </form>

    {% elif step == '2' %}
    <form method="POST">
        <input type="hidden" name="username" value="{{ username }}">

        <label>Security Question:</label>
        <p style="margin-bottom: 15px; font-weight: 600; color: #4a90e2;">{{ question }}</p>

        <label>Your Answer</label>
        <input type="text" name="security_answer" required autocomplete="off">

        <label>New Password</label>
        <input type="password" name="new_password" required>

        <button type="submit" class="primary-btn">Reset Password</button>
    </form>
    {% endif %}

    <p style="margin-top: 20px;"><a href="{{ url_for('login_page') }}">Back to Login</a></p>
</div>
{% endblock %}
